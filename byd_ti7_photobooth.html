        4-way switcher) -> done (upload to R2 -> QR + thank-you).

  BACKEND (Netlify Functions — keys stay server-side as env vars, never in this file):
    - CUTOUT_ENDPOINT  POST {imageBase64,name} -> function calls Bria /v1/background/remove ->
                       returns {png:"data:image/png;base64,..."} (same-origin, composites clean).
    - UPLOAD_ENDPOINT  POST {imageBase64,name} -> function uploads the final JPEG to Cloudflare R2 ->
                       returns {url:"..."} -> that link becomes the QR.

  DONE SCREEN: shows the preview + a QR to scan/keep the photo + a thank-you message.
        The system auto-returns home after CONFIG.IDLE_SECONDS (15s); START OVER returns instantly.
-->

<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&display=swap');
  :root{
    --bg:#070B08;--emerald:#19A974;--emerald-bright:#34D894;
    --line:rgba(243,246,243,.85);--line-soft:rgba(243,246,243,.20);
    --text:#F2F6F3;--muted:#788C82;--font:'Archivo',-apple-system,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{background:#000;font-family:var(--font);color:var(--text);display:flex;align-items:center;justify-content:center;overflow:hidden}
  .stage{position:relative;width:min(100vw,calc(100vh*0.5625));height:min(100vh,calc(100vw/0.5625));background:var(--bg);overflow:hidden;isolation:isolate}
  .stage::before{content:"";position:absolute;inset:0;z-index:0;pointer-events:none;background:radial-gradient(120% 80% at 18% 38%,rgba(25,169,116,.20),transparent 55%),radial-gradient(140% 90% at 88% 60%,rgba(11,61,44,.55),transparent 60%),radial-gradient(100% 60% at 50% 120%,rgba(25,169,116,.10),transparent 70%)}
  .stage::after{content:"";position:absolute;inset:0;z-index:0;pointer-events:none;opacity:.5;background-image:radial-gradient(1px 1px at 20% 30%,rgba(180,255,220,.6),transparent),radial-gradient(1px 1px at 70% 20%,rgba(180,255,220,.5),transparent),radial-gradient(1px 1px at 40% 70%,rgba(180,255,220,.4),transparent),radial-gradient(1px 1px at 85% 80%,rgba(180,255,220,.5),transparent),radial-gradient(1px 1px at 55% 45%,rgba(180,255,220,.35),transparent)}
  .screen{position:absolute;inset:0;z-index:1;display:none;flex-direction:column;align-items:center;padding:clamp(16px,4vh,40px) clamp(18px,6vw,46px);opacity:0;transition:opacity .4s}
  .screen.active{display:flex;opacity:1;animation:fadeUp .5s ease}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .lockup{display:flex;align-items:center;justify-content:center;flex:none}
  .lockup-mark{height:clamp(22px,3vh,30px);width:auto;display:block;opacity:.96}
  .spacer{flex:1}
  .hero{text-align:center;display:flex;flex-direction:column;align-items:center}
  .hero .model-mark{width:min(78%,360px);height:auto;filter:drop-shadow(0 6px 30px rgba(25,169,116,.25))}
  .hero .tagline{margin-top:1.3em;font-weight:600;letter-spacing:.34em;text-indent:.34em;font-size:clamp(11px,1.7vh,15px);color:var(--emerald-bright)}
  .hero .sub{margin-top:1em;font-weight:500;letter-spacing:.05em;font-size:clamp(12px,1.7vh,15px);color:var(--muted);max-width:24ch;line-height:1.5}
  .btn{width:100%;max-width:420px;padding:1.02em 1.5em;border-radius:999px;border:1px solid var(--line);background:transparent;color:var(--text);font-family:var(--font);font-weight:700;letter-spacing:.16em;text-indent:.16em;font-size:clamp(15px,2vh,19px);cursor:pointer;transition:.25s}
  .btn:hover,.btn:focus-visible{border-color:var(--emerald-bright);box-shadow:0 0 0 1px var(--emerald-bright),0 10px 40px rgba(25,169,116,.35);outline:none}
  .btn.primary{border-color:transparent;background:linear-gradient(180deg,var(--emerald),#0F7E54);box-shadow:0 12px 36px rgba(25,169,116,.35)}
  .btn.ghost{font-size:clamp(13px,1.8vh,16px);padding:.9em 1.5em}
  .btn-stack{display:flex;flex-direction:column;gap:12px;width:100%;align-items:center}
  .field{width:100%;max-width:440px;margin:0 auto;padding:1.02em 1.5em;border-radius:999px;border:1px solid var(--line-soft);background:rgba(255,255,255,.02);color:var(--text);font-family:var(--font);font-weight:600;letter-spacing:.1em;font-size:clamp(15px,2vh,18px)}
  .field::placeholder{color:var(--muted);letter-spacing:.18em}
  .field:focus{outline:none;border-color:var(--emerald-bright);box-shadow:0 0 0 1px var(--emerald-bright)}
  .frame{position:relative;width:auto;height:min(56vh,calc(100% - 230px));aspect-ratio:1667/2230;max-width:100%;border:1px solid var(--line-soft);border-radius:24px;overflow:hidden;background:#06120D;box-shadow:inset 0 0 60px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;container-type:inline-size}
  #cam{position:absolute;width:1px;height:1px;opacity:0;pointer-events:none}
  #live,#reviewImg,#composeImg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
  .placeholder{position:relative;z-index:1;text-align:center;color:rgba(242,246,243,.55);font-weight:600;letter-spacing:.18em;font-size:12px;padding:0 2em;line-height:1.8}
  .placeholder svg{width:48px;height:48px;opacity:.5;margin-bottom:12px}
  .count{position:absolute;z-index:3;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
  .count span{font-weight:900;font-size:42cqw;line-height:1;color:#fff;white-space:nowrap;text-shadow:0 0 40px rgba(25,169,116,.8),0 0 90px rgba(25,169,116,.4)}
  .count.smile span{font-size:17cqw;letter-spacing:.03em}
  .pop{animation:pop .45s cubic-bezier(.18,.9,.3,1)}
  @keyframes pop{0%{transform:scale(.45);opacity:0}60%{transform:scale(1.06);opacity:1}100%{transform:scale(1);opacity:1}}
  .flash{position:absolute;inset:0;background:#fff;opacity:0;z-index:4;pointer-events:none}
  .flash.go{animation:flash .5s ease}
  @keyframes flash{0%{opacity:0}10%{opacity:.95}100%{opacity:0}}
  .cap-title{font-weight:800;letter-spacing:.2em;text-indent:.2em;font-size:clamp(16px,2.6vh,26px);margin:10px 0 2px}
  /* stand-here guide */
  .stand-guide{position:absolute;inset:0;z-index:2;display:none;align-items:center;justify-content:center;pointer-events:none}
  .stand-guide.show{display:flex;animation:guidePulse 2.2s ease-in-out infinite}
  .stand-guide svg{height:68%;width:auto;filter:drop-shadow(0 0 12px rgba(25,169,116,.5))}
  .stand-fig{height:84%;width:auto;opacity:.6;filter:drop-shadow(0 0 16px rgba(25,169,116,.55))}
  .stand-guide .stand-label{position:absolute;top:9%;left:50%;transform:translateX(-50%);font-weight:800;letter-spacing:.26em;text-indent:.26em;font-size:clamp(11px,1.7vh,15px);color:#fff;background:rgba(11,61,44,.6);border:1px solid rgba(52,216,148,.5);padding:6px 14px;border-radius:99px;backdrop-filter:blur(3px);white-space:nowrap}
  @keyframes guidePulse{0%,100%{opacity:.55}50%{opacity:.95}}
  /* background switcher */
  .bg-row{display:flex;gap:10px;justify-content:center;width:100%;max-width:460px}
  .bg-btn{flex:1;cursor:pointer;border-radius:12px;overflow:hidden;border:2px solid transparent;transition:.2s;background:#0c1812}
  .bg-btn .thumb{width:100%;aspect-ratio:1/1.1;object-fit:cover;display:block;opacity:.8;transition:.2s}
  .bg-btn .bl{display:block;text-align:center;font-size:9px;letter-spacing:.12em;font-weight:700;color:var(--muted);padding:5px 0 4px}
  .bg-btn.sel{border-color:var(--emerald-bright);box-shadow:0 0 0 1px var(--emerald-bright)}
  .bg-btn.sel .thumb{opacity:1}
  .bg-btn.sel .bl{color:var(--emerald-bright)}
  /* done */
  .done-preview{max-height:40vh;width:auto;aspect-ratio:1667/2230;border-radius:16px;border:1px solid var(--line-soft);object-fit:cover;display:block;box-shadow:0 14px 50px rgba(0,0,0,.5)}
  .done-qr{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:18px}
  .done-qr.hide{display:none}
  .qrbox{width:104px;height:104px;background:#fff;border-radius:12px;padding:8px;flex:none;display:flex;align-items:center;justify-content:center}
  .qrbox canvas,.qrbox img{width:100%!important;height:100%!important;image-rendering:pixelated}
  .qrcap{text-align:center}
  .qrcap .t{font-weight:700;letter-spacing:.18em;font-size:12px;color:#fff;margin-bottom:5px}
  .qrcap .s{font-size:11px;letter-spacing:.04em;color:var(--muted);line-height:1.5}
  .done-thanks{text-align:center;margin-top:6px}
  .done-thanks .tt{font-weight:800;letter-spacing:.2em;text-indent:.2em;font-size:clamp(15px,2.4vh,22px);color:var(--emerald-bright)}
  .done-thanks .ts{font-size:11px;letter-spacing:.06em;color:var(--muted);margin-top:6px}
  /* Bria cut-out loading overlay (covers the compose screen while removing the background) */
  .cut-loading{position:absolute;inset:0;z-index:20;display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:40px;text-align:center;background:rgba(5,11,8,.92);backdrop-filter:blur(8px)}
  .cut-loading.show{display:flex;animation:fadeUp .3s ease}
  .cut-spinner{width:56px;height:56px;border-radius:50%;border:3px solid rgba(52,216,148,.2);border-top-color:var(--emerald-bright);animation:spin .9s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .cut-text{font-weight:700;letter-spacing:.2em;text-indent:.2em;font-size:clamp(12px,1.8vh,15px);color:var(--text)}
  .cut-text.err{color:#ff8a8a}
</style>

const OUTW=1667, OUTH=2230;          // composite output resolution (matches plates)
const PW=720, PH=Math.round(PW*OUTH/OUTW);  // working person-layer resolution

/* ----------------------------- STATE ------------------------------ */
const screens=['begin','capture','review','compose','done'];
let stream=null,userName='',selectedKey=CONFIG.DEFAULT_PLATE;
let plateImg={},running=false;
let rawCapture=null;               // OUTWxOUTH canvas: the mirrored raw photo (shown on review, sent to Bria)
let personCaptured=null;           // OUTWxOUTH canvas: the transparent cut-out returned by Bria
let outCanvas=document.createElement('canvas'); outCanvas.width=OUTW; outCanvas.height=OUTH;
let lastBlob=null,lastPhotoURL=null,idleTimer=null;
let timers=[];
function clearTimers(){timers.forEach(t=>clearTimeout(t));timers=[];}

/* preload plates */
PLATES.forEach(p=>{const im=new Image();im.onload=()=>plateImg[p.key]=im;im.src=p.src;});
let overlayImg=null;
if(CONFIG.OVERLAY_SRC){const _o=new Image();_o.onload=()=>{overlayImg=_o;refreshComposite();};_o.src=CONFIG.OVERLAY_SRC;}

function go(id){screens.forEach(s=>document.getElementById('s-'+s).classList.toggle('active',s===id));}
function beginBooth(){userName='';go('capture');startCapture();}
function coverRect(sw,sh,dw,dh){const s=Math.max(dw/sw,dh/sh);const w=sw*s,h=sh*s;return [(dw-w)/2,(dh-h)/2,w,h];}
function drawToCanvas(img,w,h){const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);return c;}

/* ----- composite: plate (cover) + person cut-out (soft shadow). The cut-out is already
   mirrored at capture, so no mirror here. ----- */
function composite(ctx,key,person,w,h){
  ctx.clearRect(0,0,w,h);
  const pl=plateImg[key];
  if(pl){const r=coverRect(pl.width,pl.height,w,h);ctx.drawImage(pl,r[0],r[1],r[2],r[3]);}
  else{ctx.fillStyle='#06120D';ctx.fillRect(0,0,w,h);}
  if(person){
    ctx.save();
    ctx.shadowColor='rgba(0,0,0,.45)';ctx.shadowBlur=w*0.045;ctx.shadowOffsetY=h*0.012;
    ctx.drawImage(person,0,0,w,h);
    ctx.restore();
  }
  if(overlayImg)ctx.drawImage(overlayImg,0,0,w,h);   // PNG overlay on top of everything
}

/* unsharp-ish sharpen applied once to the cut-out (skips transparent pixels) */
function sharpen(src){
  const w=src.width,h=src.height,c=document.createElement('canvas');c.width=w;c.height=h;
  const ctx=c.getContext('2d');ctx.drawImage(src,0,0);
  let id;try{id=ctx.getImageData(0,0,w,h);}catch(e){return src;}
  if(!id||!id.data)return src;
  const d=id.data,o=new Uint8ClampedArray(d);const k=0.6;
  for(let y=1;y<h-1;y++)for(let x=1;x<w-1;x++){
    const p=(y*w+x)*4; if(o[p+3]<8)continue;
    for(let ch=0;ch<3;ch++){
      const c0=o[p+ch],up=o[p-w*4+ch],dn=o[p+w*4+ch],lf=o[p-4+ch],rt=o[p+4+ch];
      d[p+ch]=c0+k*(4*c0-up-dn-lf-rt)*0.25*4;
    }
  }
  ctx.putImageData(id,0,0);return c;
}

/* ------------------------- camera + flow -------------------------- */
async function initCam(){
  const cam=document.getElementById('cam'),ph=document.getElementById('ph');
  if(!stream){
    try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:3840},height:{ideal:2160}},audio:false});cam.srcObject=stream;await cam.play();}
    catch(e){ph.innerHTML='CAMERA UNAVAILABLE<br>(enable it in your browser)';return false;}
  }
  ph.style.display='none';
  running=true;pump();
  return true;
}
async function pump(){
  if(!running)return;
  const cam=document.getElementById('cam');
  if(cam.videoWidth){                                          // raw mirrored live preview
    const c=document.getElementById('live'),ctx=c.getContext('2d');if(c.width!==PW){c.width=PW;c.height=PH;}
    ctx.save();ctx.translate(PW,0);ctx.scale(-1,1);const r=coverRect(cam.videoWidth,cam.videoHeight,PW,PH);ctx.drawImage(cam,r[0],r[1],r[2],r[3]);ctx.restore();
  }
  requestAnimationFrame(pump);
}
async function startCapture(){
  clearTimers();selectedKey=CONFIG.DEFAULT_PLATE;
  document.getElementById('standGuide').classList.add('show');
  const ok=await initCam();
  const count=document.getElementById('count'),title=document.getElementById('capTitle');
  const n=Math.max(1,CONFIG.COUNTDOWN_FROM||7);
  const seq=[];for(let k=n;k>=1;k--)seq.push(String(k));
  let i=0;title.textContent='STEP INTO THE OUTLINE';
  function tick(){
    if(i<seq.length){count.className='count';count.innerHTML='<span class="pop">'+seq[i]+'</span>';i++;timers.push(setTimeout(tick,1000));}
    else{count.className='count smile';count.innerHTML='<span class="pop">SMILE!</span>';title.textContent='SMILE!';document.getElementById('standGuide').classList.remove('show');timers.push(setTimeout(capture,650));}
  }
  timers.push(setTimeout(tick,ok?900:300));
}
/* freeze the raw camera frame, mirrored, at full output resolution */
function freezeRaw(){
  const c=document.createElement('canvas');c.width=OUTW;c.height=OUTH;const ctx=c.getContext('2d');
  ctx.fillStyle='#06120D';ctx.fillRect(0,0,OUTW,OUTH);
  const cam=document.getElementById('cam');
  if(cam.videoWidth){
    ctx.save();ctx.translate(OUTW,0);ctx.scale(-1,1);
    const r=coverRect(cam.videoWidth,cam.videoHeight,OUTW,OUTH);ctx.drawImage(cam,r[0],r[1],r[2],r[3]);ctx.restore();
  }
  return c;
}
function capture(){
  document.getElementById('flash').className='flash go';
  document.getElementById('standGuide').classList.remove('show');
  rawCapture=freezeRaw();
  personCaptured=null;
  document.getElementById('reviewImg').src=rawCapture.toDataURL('image/jpeg',0.92);
  document.getElementById('count').innerHTML='';
  timers.push(setTimeout(()=>{running=false;go('review');},450));
}

/* ------------------- Bria cut-out (fired on CONTINUE) ------------------- */
async function cutoutBria(b64){
  if(!CONFIG.CUTOUT_ENDPOINT)return null;
  try{
    const r=await fetch(CONFIG.CUTOUT_ENDPOINT,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({imageBase64:b64,name:userName})});
    if(!r.ok)return null;
    const j=await r.json().catch(()=>null);
    return j&&(j.png||j.dataURI||j.url)||null;   // data-URI PNG preferred (same-origin, composites clean)
  }catch(e){return null;}
}
function cutFail(){
  const txt=document.getElementById('cutText'),retry=document.getElementById('cutRetry');
  txt.className='cut-text err';txt.textContent='COULDN\u2019T REMOVE BACKGROUND';retry.style.display='';
}
async function runCutout(){
  go('compose');
  selectedKey=CONFIG.DEFAULT_PLATE;
  const loading=document.getElementById('cutLoading'),txt=document.getElementById('cutText'),retry=document.getElementById('cutRetry');
  loading.classList.add('show');retry.style.display='none';txt.className='cut-text';txt.textContent='REMOVING BACKGROUND\u2026';
  const _sw=Math.min(OUTW,1600),_sh=Math.round(_sw*OUTH/OUTW);
  const _sc=document.createElement('canvas');_sc.width=_sw;_sc.height=_sh;
  _sc.getContext('2d').drawImage(rawCapture,0,0,_sw,_sh);
  const b64=_sc.toDataURL('image/jpeg',0.9).split(',')[1];
  let png=await cutoutBria(b64);
  if(!png){txt.textContent='RETRYING\u2026';png=await cutoutBria(b64);}   // one retry
  if(png){
    const img=new Image();
    img.onload=()=>{const nw=img.naturalWidth||img.width||OUTW,nh=img.naturalHeight||img.height||OH;personCaptured=sharpen(drawToCanvas(img,nw,nh));renderCompose();loading.classList.remove('show');};
    img.onerror=()=>cutFail();
    img.src=png;
  } else if(CONFIG.RAW_FALLBACK){                                          // service down -> deliver the raw photo
    const ctx=outCanvas.getContext('2d');ctx.clearRect(0,0,OUTW,OUTH);ctx.drawImage(rawCapture,0,0,OUTW,OUTH);if(overlayImg)ctx.drawImage(overlayImg,0,0,OUTW,OUTH);
    loading.classList.remove('show');go('done');enterDone();
  } else {cutFail();}
}
function renderCompose(){
  const ctx=outCanvas.getContext('2d');
  composite(ctx,selectedKey,personCaptured,OUTW,OUTH);
  document.getElementById('composeImg').src=outCanvas.toDataURL('image/jpeg',0.95);
}
function refreshComposite(){           // re-apply overlay/composite if it loads after a screen already rendered
  if(!personCaptured)return;
  renderCompose();
  if(document.getElementById('s-done').classList.contains('active')){
    const d=outCanvas.toDataURL('image/jpeg',0.95);
    document.getElementById('donePreview').src=d;
  }
}
function buildBgRow(){
  const row=document.getElementById('bgRow');if(!row)return;row.innerHTML='';
  PLATES.forEach(p=>{
    const b=document.createElement('div');b.className='bg-btn'+(p.key===selectedKey?' sel':'');
    b.innerHTML=`<img class="thumb" src="${p.src}"><span class="bl">${p.label}</span>`;
    b.onclick=()=>{selectedKey=p.key;document.querySelectorAll('.bg-btn').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');renderCompose();};
    row.appendChild(b);
  });
}
function retake(){personCaptured=null;rawCapture=null;go('capture');running=true;pump();startCapture();}

/* ------------------------------ done / print ------------------------------ */
async function enterDone(){
  const qrEl=document.getElementById('doneQr');
  const dataURL=outCanvas.toDataURL('image/jpeg',0.95);
  document.getElementById('donePreview').src=dataURL;
  lastBlob=await new Promise(res=>outCanvas.toBlob(res,'image/jpeg',0.92));
  const url=(await uploadPhoto(dataURL.split(',')[1]))||CONFIG.QR_FALLBACK_URL||null;
  lastPhotoURL=url;
  if(url){renderQR('qrbox',url);qrEl.classList.remove('hide');}
  else{qrEl.classList.add('hide');}
  // auto-return to home after a short idle; START OVER does the same instantly.
  clearTimeout(idleTimer);
  idleTimer=setTimeout(resetAll,CONFIG.IDLE_SECONDS*1000);
}
// POST the final JPEG (base64) -> Netlify function uploads to R2 -> returns {url}; that link drives the QR.
async function uploadPhoto(b64){
  if(!CONFIG.UPLOAD_ENDPOINT)return null;
  try{
    const r=await fetch(CONFIG.UPLOAD_ENDPOINT,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({imageBase64:b64,name:userName})});
    if(!r.ok)return null;
    const j=await r.json().catch(()=>null);
    return j&&(j.url||j.secure_url||j.link)||null;
  }catch(e){return null;}
}
function renderQR(id,text){
  const box=document.getElementById(id);if(!box||!text)return;box.innerHTML='';
  const linkFallback=()=>{box.innerHTML='<div style="font-size:8px;line-height:1.3;color:#000;word-break:break-all;padding:4px;text-align:center">'+text+'</div>';};
  if(typeof QRCode!=='undefined'&&QRCode.toCanvas){
    const cv=document.createElement('canvas');box.appendChild(cv);
    QRCode.toCanvas(cv,text,{width:240,margin:0,color:{dark:'#000000',light:'#ffffff'}},(err)=>{if(err)linkFallback();});
  } else { linkFallback(); }
}
function resetAll(){
  clearTimeout(idleTimer);clearTimers();
  userName='';selectedKey=CONFIG.DEFAULT_PLATE;personCaptured=null;rawCapture=null;lastPhotoURL=null;lastBlob=null;
  document.getElementById('doneQr').classList.add('hide');
  document.getElementById('cutLoading').classList.remove('show');
  go('begin');
}
</script>
